<!DOCTYPE html>
<html>
<head>
    <title>map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet"
          href="https://atlas.microsoft.com/sdk/javascript/mapcontrol/3/atlas.min.css"
          type="text/css" />
    <script src="https://atlas.microsoft.com/sdk/javascript/mapcontrol/3/atlas.min.js"></script>

    <script src="https://samples.azuremaps.com/lib/azure-maps/azure-maps-helper.min.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }
        #myMap {
            width: 100%;
            height: 100%;
        }
        #searchPanel {
            position: absolute;
            top: 16px;
            left: 16px;
            z-index: 10;
            width: min(420px, calc(100% - 32px));
            padding: 12px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.96);
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.22);
            font-family: Arial, sans-serif;
        }
        .search-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }
        .search-row input {
            flex: 1;
            min-width: 0;
            padding: 9px 10px;
            border: 1px solid #bbb;
            border-radius: 6px;
            font-size: 14px;
        }
        .search-row button {
            padding: 9px 12px;
            border: 0;
            border-radius: 6px;
            background: #2272B9;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        #searchStatus {
            min-height: 18px;
            color: #555;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="searchPanel">
        <div class="search-row">
            <input id="startSearchInput" type="text" placeholder="Search start location" />
            <button id="startSearchButton" type="button">Start</button>
        </div>
        <div class="search-row">
            <input id="endSearchInput" type="text" placeholder="Search destination" />
            <button id="endSearchButton" type="button">End</button>
        </div>
        <div id="searchStatus"></div>
    </div>
    <div id="myMap"></div>
    <script src="map.js"></script>
</body>
</html>
